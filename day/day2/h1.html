<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image tags</title>
</head>
<body>
    <!-- image tags -->
     <img src="images (1).jpeg" alt="could not find the image ">
    <img src="image/im.jpeg" alt="could not find the image "> 
     <!-- common attributes and variations  -->
    <img src="image/im.jpeg" alt="could not find the image " width="200" height="100">
     <!-- tool tip -->
    <img src="image/im.jpeg" alt="could not find the image " title="image of a spiderman ">
     <!-- style -->
    <img src="image/im.jpeg" alt="could not find the image" style=" width:200; height:200;border-radius:40%; border:4px solid #d31313">  

</body>
</html>
